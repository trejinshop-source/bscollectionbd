<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>পাসওয়ার্ড রিসেট — BS Collection BD</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
<link rel="stylesheet" href="css/bs-app.css"/>
<style>
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f8fafc;margin:0}
  .auth-wrap{min-height:80vh;display:grid;place-items:center;padding:40px 16px}
  .auth-card{background:#fff;padding:30px;border-radius:14px;box-shadow:0 10px 40px rgba(0,0,0,.08);width:100%;max-width:420px}
  .auth-card h2{color:#14213D;margin:0 0 6px}
  .auth-card p{color:#64748b;font-size:14px;margin:0 0 20px}
  .auth-card label{display:block;font-size:13px;color:#334155;margin-bottom:6px;font-weight:600}
  .auth-card input{width:100%;padding:11px 14px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit;outline:none;margin-bottom:14px}
  .auth-card input:focus{border-color:#FCA311}
  .auth-card button{width:100%;background:#14213D;color:#fff;border:0;padding:12px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
  .auth-card button:hover{background:#FCA311}
  .auth-card .foot{margin-top:14px;font-size:13px;color:#64748b;text-align:center}
  .auth-card .foot a{color:#14213D;font-weight:600;text-decoration:none}
  .otp{letter-spacing:8px;text-align:center;font-size:20px;font-weight:700}
</style>
</head>
<body data-page="reset">
  <div class="auth-wrap">
    <form id="resetForm" class="auth-card">
      <h2><i class="fas fa-lock" style="color:#FCA311"></i> নতুন পাসওয়ার্ড সেট করুন</h2>
      <p>ইমেইলে পাওয়া OTP এবং নতুন পাসওয়ার্ড দিন।</p>
      <label>ইমেইল</label>
      <input type="email" name="email" required placeholder="you@example.com"/>
      <label>OTP কোড</label>
      <input type="text" name="code" required maxlength="6" class="otp" placeholder="000000"/>
      <label>নতুন পাসওয়ার্ড</label>
      <input type="password" name="newPassword" required minlength="6" placeholder="কমপক্ষে ৬ অক্ষর"/>
      <label>পাসওয়ার্ড কনফার্ম</label>
      <input type="password" name="confirmPassword" required minlength="6" placeholder="আবার লিখুন"/>
      <button type="submit">পাসওয়ার্ড সেট করুন <i class="fas fa-check"></i></button>
      <div class="foot">
        <a href="forgot-password.html">আবার OTP পাঠান</a> · <a href="login.html">লগইন</a>
      </div>
    </form>
  </div>
  
  
<script>
// Auto-fill email from sessionStorage and handle backend OTP verify
(function(){
  var API = window.BS_API_BASE || 'https://bscollectionbd.onrender.com/api';
  function toast(m,t){
    var el=document.getElementById('bs-toast-rp');
    if(!el){el=document.createElement('div');el.id='bs-toast-rp';el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;color:#fff;transition:.3s';document.body.appendChild(el);}
    el.textContent=m;el.style.background=t==='err'?'#dc2626':'#059669';el.style.opacity='1';
    clearTimeout(toast._t);toast._t=setTimeout(()=>{el.style.opacity='0';},2800);
  }
  document.addEventListener('DOMContentLoaded',function(){
    var emailInput=document.querySelector('#resetForm input[name=email]');
    var savedEmail=sessionStorage.getItem('bs_reset_email')||'';
    if(emailInput&&savedEmail)emailInput.value=savedEmail;
    var frm=document.getElementById('resetForm');
    if(frm) frm.onsubmit=async function(e){
      e.preventDefault();
      var email=(frm.querySelector('input[name=email]').value||'').trim();
      var code=(frm.querySelector('input[name=code]').value||'').trim();
      var newPw=frm.querySelector('input[name=newPassword]').value;
      var confirmPw=frm.querySelector('input[name=confirmPassword]').value;
      if(!email)return toast('ইমেইল দিন','err');
      if(!code)return toast('OTP কোড দিন','err');
      if(newPw!==confirmPw)return toast('পাসওয়ার্ড মিলছে না','err');
      if(newPw.length<6)return toast('পাসওয়ার্ড কমপক্ষে ৬ অক্ষর','err');
      var btn=frm.querySelector('button[type=submit]');
      btn.disabled=true;btn.textContent='আপডেট হচ্ছে...';
      try{
        var res=await fetch(API+'/customer/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,code:code,newPassword:newPw})});
        var data=await res.json().catch(()=>({}));
        if(res.ok){
          toast(data.msg||'পাসওয়ার্ড পরিবর্তন সফল!','ok');
          sessionStorage.removeItem('bs_reset_email');
          setTimeout(()=>location.href='login.html',900);
        } else {
          toast(data.error||'OTP ভুল বা মেয়াদোত্তীর্ণ','err');
        }
      }catch(ex){toast('নেটওয়ার্ক সমস্যা','err');}
      finally{btn.disabled=false;btn.innerHTML='পাসওয়ার্ড সেট করুন <i class="fas fa-check"></i>';}
    };
  });
})();
</script>

<!-- BS_INJECT_START -->


<!-- BS_INJECT_END -->
</body>
</html>
