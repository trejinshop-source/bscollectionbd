<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>পাসওয়ার্ড ভুলে গেছেন? — BS Collection BD</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
<link rel="stylesheet" href="css/bs-app.css"/>
<style>
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f8fafc;margin:0}
  .auth-wrap{min-height:80vh;display:grid;place-items:center;padding:40px 16px}
  .auth-card{background:#fff;padding:30px;border-radius:14px;box-shadow:0 10px 40px rgba(0,0,0,.08);width:100%;max-width:420px}
  .auth-card h2{color:#14213D;margin:0 0 6px}
  .auth-card p{color:#64748b;font-size:14px;margin:0 0 20px}
  .auth-card label{display:block;font-size:13px;color:#334155;margin-bottom:6px;font-weight:600}
  .auth-card input{width:100%;padding:11px 14px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;font-family:inherit;outline:none;margin-bottom:14px}
  .auth-card input:focus{border-color:#FCA311}
  .auth-card button{width:100%;background:#14213D;color:#fff;border:0;padding:12px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
  .auth-card button:hover{background:#FCA311}
  .auth-card .foot{margin-top:14px;font-size:13px;color:#64748b;text-align:center}
  .auth-card .foot a{color:#14213D;font-weight:600;text-decoration:none}
</style>
</head>
<body data-page="forgot">
  <div class="auth-wrap">
    <form id="forgotForm" class="auth-card">
      <h2><i class="fas fa-key" style="color:#FCA311"></i> পাসওয়ার্ড ভুলে গেছেন?</h2>
      <p>আপনার ইমেইলে ৬ ডিজিটের OTP পাঠানো হবে। (Gmail অ্যাকাউন্টের জন্য ইমেইল দিন)</p>
      <label>ইমেইল ঠিকানা</label>
      <input type="text" name="email" id="forgotId" required placeholder="you@example.com" autocomplete="email"/>
      <button type="submit">OTP পাঠান <i class="fas fa-paper-plane"></i></button>
      <div class="foot">
        মনে পড়েছে? <a href="login.html">লগইন করুন</a>
      </div>
    </form>
    <script>
    // Standalone forgot-password page — backend OTP support
    (function(){
      var API = window.BS_API_BASE || 'https://bscollectionbd.onrender.com/api';
      function toast(m,t){
        var el=document.getElementById('bs-toast-fp');
        if(!el){el=document.createElement('div');el.id='bs-toast-fp';el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;color:#fff;transition:.3s';document.body.appendChild(el);}
        el.textContent=m;el.style.background=t==='err'?'#dc2626':'#059669';el.style.opacity='1';
        clearTimeout(toast._t);toast._t=setTimeout(()=>{el.style.opacity='0';},2800);
      }
      var frm=document.getElementById('forgotForm');
      if(frm) frm.onsubmit=async function(e){
        e.preventDefault();
        var id=(document.getElementById('forgotId').value||'').trim();
        if(!id)return toast('ইমেইল ঠিকানা দিন','err');
        var btn=frm.querySelector('button[type=submit]');
        btn.disabled=true;btn.textContent='পাঠানো হচ্ছে...';
        try{
          var payload={email:id};
          var res=await fetch(API+'/customer/forgot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
          var data=await res.json().catch(()=>({}));
          if(res.ok){
            toast(data.msg||'OTP পাঠানো হয়েছে','ok');
            sessionStorage.setItem('bs_reset_email',id);
            setTimeout(()=>location.href='reset-password.html',800);
          } else {
            toast(data.error||'ব্যর্থ হয়েছে','err');
          }
        }catch(ex){toast('নেটওয়ার্ক সমস্যা। আবার চেষ্টা করুন।','err');}
        finally{btn.disabled=false;btn.innerHTML='OTP পাঠান <i class="fas fa-paper-plane"></i>';}
      };
    })();
    </script>
  </div>
  
  

<!-- BS_INJECT_START -->


<!-- BS_INJECT_END -->
</body>
</html>
